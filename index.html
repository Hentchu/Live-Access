<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Privé | Authentification</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #ff4757;
            --red-glow: rgba(255, 71, 87, 0.35);
            --bg: #080a0d;
            --panel: #0e1217;
            --border: #1e2530;
            --text: #c8d6e5;
            --dim: #4a5568;
            --mono: 'Share Tech Mono', monospace;
            --sans: 'Rajdhani', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            overflow: hidden;
        }

        /* ── Animated grid background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,71,87,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,71,87,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridPan 30s linear infinite;
            pointer-events: none;
        }

        @keyframes gridPan {
            from { background-position: 0 0; }
            to   { background-position: 40px 40px; }
        }

        /* ── Gate wrapper ── */
        #gate {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        #gate.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.96);
        }

        /* ── Panel ── */
        .panel {
            width: 380px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 40px 36px 36px;
            position: relative;
            animation: panelIn 0.7s cubic-bezier(.22,.68,0,1.2) both;
        }

        @keyframes panelIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)   scale(1); }
        }

        /* Corner accents */
        .panel::before, .panel::after {
            content: '';
            position: absolute;
            width: 14px; height: 14px;
            border-color: var(--red);
            border-style: solid;
        }
        .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        /* ── Header ── */
        .badge {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.2em;
            color: var(--red);
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge::before {
            content: '';
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--red);
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--red-glow); }
            50%       { opacity: 0.6; box-shadow: 0 0 0 6px transparent; }
        }

        h2 {
            font-family: var(--sans);
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #fff;
            line-height: 1;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            font-weight: 300;
            color: var(--dim);
            letter-spacing: 0.04em;
            margin-bottom: 32px;
        }

        /* ── Divider ── */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, var(--red) 0%, transparent 100%);
            margin-bottom: 28px;
            opacity: 0.4;
        }

        /* ── Input group ── */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.15em;
            color: var(--dim);
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 44px 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: #fff;
            font-family: var(--mono);
            font-size: 15px;
            letter-spacing: 0.1em;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px var(--red-glow);
        }

        /* Eye toggle */
        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--dim);
            padding: 4px;
            transition: color 0.2s;
            line-height: 0;
        }
        .eye-btn:hover { color: var(--text); }

        /* ── Submit button ── */
        .btn-submit {
            width: 100%;
            padding: 13px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 3px;
            font-family: var(--sans);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            background: #ff6b7a;
            box-shadow: 0 0 20px var(--red-glow);
        }

        .btn-submit:active { transform: scale(0.98); }

        /* Ripple on click */
        .btn-submit .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: scale(0);
            animation: rippleAnim 0.5s linear;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        /* ── Error message ── */
        .error-msg {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--red);
            letter-spacing: 0.06em;
            opacity: 0;
            transform: translateY(-4px);
            transition: opacity 0.3s, transform 0.3s;
        }

        .error-msg.show {
            opacity: 1;
            transform: translateY(0);
        }

        .error-msg::before {
            content: '!';
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px; height: 16px;
            border: 1px solid var(--red);
            border-radius: 50%;
            flex-shrink: 0;
            font-size: 10px;
        }

        /* Shake animation on wrong password */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-8px); }
            40%      { transform: translateX(8px); }
            60%      { transform: translateX(-5px); }
            80%      { transform: translateX(5px); }
        }
        .shake { animation: shake 0.4s ease; }

        /* ── Footer ── */
        .panel-footer {
            margin-top: 28px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--dim);
            letter-spacing: 0.08em;
            display: flex;
            justify-content: space-between;
        }

        /* ── Stream container ── */
        #stream-container {
            position: fixed;
            inset: 0;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.7s ease;
            background: #000;
            z-index: 5;
        }

        #stream-container.visible {
            visibility: visible;
            opacity: 1;
        }

        #ninja-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #000;
        }
    </style>
</head>
<body>

    <!-- ── Gate ── -->
    <div id="gate">
        <div class="panel" id="panel">

            <div class="badge">Accès Restreint</div>

            <h2>Stream Privé</h2>
            <p class="subtitle">Entrez votre code d'accès pour continuer</p>

            <div class="divider"></div>

            <div class="input-group">
                <label class="input-label" for="login">Identifiant</label>
                <div class="input-wrap">
                    <input type="text" id="login" placeholder="Entrez votre identifiant" autocomplete="off" autofocus>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label" for="password">Code d'accès</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="••••••••••••••" autocomplete="off" autofocus>
                    <button class="eye-btn" id="eye-btn" type="button" aria-label="Afficher le mot de passe" onclick="toggleVisibility()">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button class="btn-submit" id="submit-btn" onclick="checkAuth(event)">
                Se connecter
            </button>

            <div class="error-msg" id="error-msg">Mot de passe incorrect</div>

            <div class="panel-footer">
                <span>STREAM_v1.0</span>
                <span id="clock">--:--:--</span>
            </div>
        </div>
    </div>

    <!-- ── Stream ── -->
    <div id="stream-container">

        <!-- Écran de chargement -->
        <div id="loading-screen" style="
            position:absolute; inset:0; z-index:2;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            background:#080a0d;
        ">
            <div style="position:relative;width:64px;height:64px;margin-bottom:24px;">
                <div style="
                    position:absolute;inset:0;border-radius:50%;
                    border:2px solid transparent;
                    border-top-color:#ff4757;
                    animation:spin 1s linear infinite;
                "></div>
                <div style="
                    position:absolute;inset:10px;border-radius:50%;
                    border:2px solid transparent;
                    border-bottom-color:rgba(255,71,87,0.4);
                    animation:spin 1.6s linear infinite reverse;
                "></div>
            </div>
            <div style="font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:0.2em;color:#ff4757;margin-bottom:8px;">CHARGEMENT DU STREAM</div>
            <div style="font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:0.1em;color:#4a5568;" id="load-msg">Connexion en cours…</div>
        </div>

        <iframe id="ninja-frame"
            src=""
            allow="autoplay; camera; microphone; fullscreen; display-capture;"
            style="position:relative;z-index:1;">
        </iframe>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

</body>
</html>
