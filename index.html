<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Privé | Authentification</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #ff4757;
            --red-glow: rgba(255, 71, 87, 0.35);
            --bg: #080a0d;
            --panel: #0e1217;
            --border: #1e2530;
            --text: #c8d6e5;
            --dim: #4a5568;
            --mono: 'Share Tech Mono', monospace;
            --sans: 'Rajdhani', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            overflow: hidden;
        }

        /* ── Animated grid background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,71,87,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,71,87,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridPan 30s linear infinite;
            pointer-events: none;
        }

        @keyframes gridPan {
            from { background-position: 0 0; }
            to   { background-position: 40px 40px; }
        }

        /* ── Gate wrapper ── */
        #gate {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        #gate.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.96);
        }

        /* ── Panel ── */
        .panel {
            width: 380px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 40px 36px 36px;
            position: relative;
            animation: panelIn 0.7s cubic-bezier(.22,.68,0,1.2) both;
        }

        @keyframes panelIn {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)   scale(1); }
        }

        /* Corner accents */
        .panel::before, .panel::after {
            content: '';
            position: absolute;
            width: 14px; height: 14px;
            border-color: var(--red);
            border-style: solid;
        }
        .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        /* ── Header ── */
        .badge {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.2em;
            color: var(--red);
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge::before {
            content: '';
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--red);
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--red-glow); }
            50%       { opacity: 0.6; box-shadow: 0 0 0 6px transparent; }
        }

        h2 {
            font-family: var(--sans);
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #fff;
            line-height: 1;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            font-weight: 300;
            color: var(--dim);
            letter-spacing: 0.04em;
            margin-bottom: 32px;
        }

        /* ── Divider ── */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, var(--red) 0%, transparent 100%);
            margin-bottom: 28px;
            opacity: 0.4;
        }

        /* ── Input group ── */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.15em;
            color: var(--dim);
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 44px 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 3px;
            color: #fff;
            font-family: var(--mono);
            font-size: 15px;
            letter-spacing: 0.1em;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px var(--red-glow);
        }

        /* Eye toggle */
        .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--dim);
            padding: 4px;
            transition: color 0.2s;
            line-height: 0;
        }
        .eye-btn:hover { color: var(--text); }

        /* ── Submit button ── */
        .btn-submit {
            width: 100%;
            padding: 13px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 3px;
            font-family: var(--sans);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
            position: relative;
            overflow: hidden;
        }

        .btn-submit:hover {
            background: #ff6b7a;
            box-shadow: 0 0 20px var(--red-glow);
        }

        .btn-submit:active { transform: scale(0.98); }

        /* Ripple on click */
        .btn-submit .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: scale(0);
            animation: rippleAnim 0.5s linear;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to { transform: scale(4); opacity: 0; }
        }

        /* ── Error message ── */
        .error-msg {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--red);
            letter-spacing: 0.06em;
            opacity: 0;
            transform: translateY(-4px);
            transition: opacity 0.3s, transform 0.3s;
        }

        .error-msg.show {
            opacity: 1;
            transform: translateY(0);
        }

        .error-msg::before {
            content: '!';
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px; height: 16px;
            border: 1px solid var(--red);
            border-radius: 50%;
            flex-shrink: 0;
            font-size: 10px;
        }

        /* Shake animation on wrong password */
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%      { transform: translateX(-8px); }
            40%      { transform: translateX(8px); }
            60%      { transform: translateX(-5px); }
            80%      { transform: translateX(5px); }
        }
        .shake { animation: shake 0.4s ease; }

        /* ── Footer ── */
        .panel-footer {
            margin-top: 28px;
            font-family: var(--mono);
            font-size: 10px;
            color: var(--dim);
            letter-spacing: 0.08em;
            display: flex;
            justify-content: space-between;
        }

        /* ── Stream container ── */
        #stream-container {
            position: fixed;
            inset: 0;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.7s ease;
            background: #000;
            z-index: 5;
        }

        #stream-container.visible {
            visibility: visible;
            opacity: 1;
        }

        #ninja-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #000;
        }
    </style>
</head>
<body>

    <!-- ── Gate ── -->
    <div id="gate">
        <div class="panel" id="panel">

            <div class="badge">Accès Restreint</div>

            <h2>Stream Privé</h2>
            <p class="subtitle">Entrez votre code d'accès pour continuer</p>

            <div class="divider"></div>

            <div class="input-group">
                <label class="input-label" for="login">Identifiant</label>
                <div class="input-wrap">
                    <input type="text" id="login" placeholder="Entrez votre identifiant" autocomplete="off" autofocus>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label" for="password">Code d'accès</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="••••••••••••••" autocomplete="off" autofocus>
                    <button class="eye-btn" id="eye-btn" type="button" aria-label="Afficher le mot de passe" onclick="toggleVisibility()">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button class="btn-submit" id="submit-btn" onclick="checkAuth(event)">
                Se connecter
            </button>

            <div class="error-msg" id="error-msg">Mot de passe incorrect</div>

            <div class="panel-footer">
                <span>STREAM_v1.0</span>
                <span id="clock">--:--:--</span>
            </div>
        </div>
    </div>

    <!-- ── Stream ── -->
    <div id="stream-container">

        <!-- Écran de chargement -->
        <div id="loading-screen" style="
            position:absolute; inset:0; z-index:2;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            background:#080a0d;
        ">
            <div style="position:relative;width:64px;height:64px;margin-bottom:24px;">
                <div style="
                    position:absolute;inset:0;border-radius:50%;
                    border:2px solid transparent;
                    border-top-color:#ff4757;
                    animation:spin 1s linear infinite;
                "></div>
                <div style="
                    position:absolute;inset:10px;border-radius:50%;
                    border:2px solid transparent;
                    border-bottom-color:rgba(255,71,87,0.4);
                    animation:spin 1.6s linear infinite reverse;
                "></div>
            </div>
            <div style="font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:0.2em;color:#ff4757;margin-bottom:8px;">CHARGEMENT DU STREAM</div>
            <div style="font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:0.1em;color:#4a5568;" id="load-msg">Connexion en cours…</div>
        </div>

        <iframe id="ninja-frame"
            src=""
            allow="autoplay; camera; microphone; fullscreen; display-capture;"
            style="position:relative;z-index:1;">
        </iframe>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script>
        // ╔══════════════════════════════════════════════════════════╗
        // ║             ⚙️  CONFIGURATION — À MODIFIER ICI           ║
        // ║  Changez login et mot de passe à tout moment             ║
        // ╚══════════════════════════════════════════════════════════╝
        const SECRET_LOGIN    = "StreamID";          // ← Changer le login ici
        const SECRET_PASSWORD = "testpass";    // ← Changer le mot de passe ici
        // ──────────────────────────────────────────────────────────
        const NINJA_ID        = "CameraFpvmID";
        const NINJA_URL       = `https://vdo.ninja/?view=Hentchu&solo&room=${NINJA_ID}&password=VDOfpvm1234&bitrate=10000&scale=100&clean&buffer=0&autoplay=1&autostart=1&cleanoutput=1&nomenu=1`;
        // ──────────────────────────────────────────────────────────

        // ── Vérification au chargement de la page ──────────────────
        // Si déjà authentifié dans cette session, afficher le stream directement
        function launchStream() {
            document.getElementById('gate').classList.add('hidden');
            const container = document.getElementById('stream-container');
            const frame     = document.getElementById('ninja-frame');

            container.style.visibility = 'visible';
            container.style.opacity    = '1';

            const msgs = ['Connexion en cours…','Authentification du flux…','Établissement P2P…','Synchronisation vidéo…','Presque prêt…'];
            let mi = 0;
            const msgTimer = setInterval(() => {
                mi = (mi + 1) % msgs.length;
                const el = document.getElementById('load-msg');
                if (el) el.textContent = msgs[mi];
            }, 2500);

            setTimeout(() => { frame.src = NINJA_URL; }, 400);

            const fallback = setTimeout(() => {
                if (!frame.src || frame.src === 'about:blank') frame.src = NINJA_URL;
            }, 8000);

            frame.onload = () => {
                clearTimeout(fallback);
                clearInterval(msgTimer);
                const ls = document.getElementById('loading-screen');
                if (ls) {
                    ls.style.transition = 'opacity 0.6s ease';
                    ls.style.opacity = '0';
                    setTimeout(() => ls.style.display = 'none', 600);
                }
            };
        }

        // Au chargement : vérifier si session active
        if (sessionStorage.getItem('auth') === 'ok') {
            launchStream();
        }

        // Live clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent =
                now.toTimeString().slice(0, 8);
        }
        updateClock();
        setInterval(updateClock, 1000);

        // Eye toggle
        function toggleVisibility() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>`;
            } else {
                input.type = 'password';
                icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`;
            }
        }

        // Ripple effect
        function spawnRipple(btn, e) {
            const rect   = btn.getBoundingClientRect();
            const size   = Math.max(rect.width, rect.height);
            const x      = e.clientX - rect.left  - size / 2;
            const y      = e.clientY - rect.top   - size / 2;
            const ripple = document.createElement('span');
            ripple.className = 'ripple';
            ripple.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
            btn.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        }

        // Auth check
        function checkAuth(e) {
            const btn        = document.getElementById('submit-btn');
            const loginInput = document.getElementById('login');
            const input      = document.getElementById('password');
            const err        = document.getElementById('error-msg');
            const panel      = document.getElementById('panel');

            spawnRipple(btn, e);

            if (loginInput.value.trim() === SECRET_LOGIN && input.value === SECRET_PASSWORD) {
                // Sauvegarder la session
                sessionStorage.setItem('auth', 'ok');
                launchStream();

            } else {
                // Show error + shake panel
                err.classList.add('show');
                panel.classList.remove('shake');
                void panel.offsetWidth;
                panel.classList.add('shake');
                input.value = '';
                loginInput.focus();

                // Clear error after 3s
                setTimeout(() => err.classList.remove('show'), 3000);
            }
        }

        // Enter key support
        document.getElementById('login').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });
        document.getElementById('password').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') document.getElementById('submit-btn').click();
        });

        // 🔒 Protection — désactive clic droit et raccourcis DevTools
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (
                e.key === 'F12' ||
                (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase())) ||
                (e.ctrlKey && e.key.toUpperCase() === 'U')
            ) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
