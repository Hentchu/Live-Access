<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Privé | Accès</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --red: #ff4757;
            --red-glow: rgba(255, 71, 87, 0.35);
            --bg: #080a0d;
            --panel: #0e1217;
            --border: #1e2530;
            --text: #c8d6e5;
            --dim: #4a5568;
            --mono: 'Share Tech Mono', monospace;
            --sans: 'Rajdhani', sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; background-color: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(rgba(255,71,87,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,71,87,0.04) 1px, transparent 1px);
            background-size: 40px 40px; animation: gridPan 30s linear infinite; pointer-events: none; z-index: 0;
        }
        @keyframes gridPan { from { background-position: 0 0; } to { background-position: 40px 40px; } }

        /* Pages */
        #login-page, #signup-page {
            position: fixed; inset: 0; display: flex;
            align-items: center; justify-content: center; z-index: 10;
        }
        #signup-page { display: none; }

        /* Panel */
        .panel {
            width: 400px; background: var(--panel);
            border: 1px solid var(--border); border-radius: 4px;
            padding: 40px 36px 36px; position: relative;
            animation: panelIn 0.7s cubic-bezier(.22,.68,0,1.2) both;
        }
        @keyframes panelIn { from { opacity:0; transform:translateY(24px) scale(0.97); } to { opacity:1; transform:translateY(0) scale(1); } }
        .panel::before, .panel::after { content:''; position:absolute; width:14px; height:14px; border-color:var(--red); border-style:solid; }
        .panel::before { top:-1px; left:-1px; border-width:2px 0 0 2px; }
        .panel::after  { bottom:-1px; right:-1px; border-width:0 2px 2px 0; }

        .badge { font-family:var(--mono); font-size:10px; letter-spacing:0.2em; color:var(--red); text-transform:uppercase; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
        .badge::before { content:''; display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--red); animation:pulse 1.8s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity:1; box-shadow:0 0 0 0 var(--red-glow); } 50% { opacity:0.6; box-shadow:0 0 0 6px transparent; } }

        h2 { font-family:var(--sans); font-size:24px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:#fff; line-height:1; margin-bottom:6px; }
        .subtitle { font-size:13px; font-weight:300; color:var(--dim); letter-spacing:0.04em; margin-bottom:28px; }
        .divider { width:100%; height:1px; background:linear-gradient(90deg,var(--red) 0%,transparent 100%); margin-bottom:24px; opacity:0.4; }

        .input-group { position:relative; margin-bottom:18px; }
        .input-label { font-family:var(--mono); font-size:10px; letter-spacing:0.15em; color:var(--dim); text-transform:uppercase; display:block; margin-bottom:8px; }
        .input-wrap { position:relative; }
        input[type="password"], input[type="text"], input[type="email"] {
            width:100%; padding:12px 44px 12px 14px;
            background:var(--bg); border:1px solid var(--border); border-radius:3px;
            color:#fff; font-family:var(--mono); font-size:14px; letter-spacing:0.08em;
            outline:none; transition:border-color 0.25s, box-shadow 0.25s;
        }
        input:focus { border-color:var(--red); box-shadow:0 0 0 3px var(--red-glow); }
        .eye-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--dim); padding:4px; transition:color 0.2s; line-height:0; }
        .eye-btn:hover { color:var(--text); }

        .btn-submit {
            width:100%; padding:13px; background:var(--red); color:#fff; border:none; border-radius:3px;
            font-family:var(--sans); font-size:14px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase;
            cursor:pointer; transition:background 0.2s, box-shadow 0.2s, transform 0.1s; position:relative; overflow:hidden;
        }
        .btn-submit:hover { background:#ff6b7a; box-shadow:0 0 20px var(--red-glow); }
        .btn-submit:active { transform:scale(0.98); }
        .btn-submit:disabled { opacity:0.6; cursor:not-allowed; }
        .btn-submit .ripple { position:absolute; border-radius:50%; background:rgba(255,255,255,0.2); transform:scale(0); animation:rippleAnim 0.5s linear; pointer-events:none; }
        @keyframes rippleAnim { to { transform:scale(4); opacity:0; } }

        .switch-link { text-align:center; margin-top:20px; font-family:var(--mono); font-size:11px; color:var(--dim); letter-spacing:0.06em; }
        .switch-link a { color:var(--red); text-decoration:none; cursor:pointer; border-bottom:1px solid transparent; transition:border-color 0.2s; }
        .switch-link a:hover { border-color:var(--red); }

        .error-msg { display:flex; align-items:center; gap:8px; margin-top:12px; font-family:var(--mono); font-size:11px; color:var(--red); letter-spacing:0.06em; opacity:0; transform:translateY(-4px); transition:opacity 0.3s, transform 0.3s; min-height:20px; }
        .error-msg.show { opacity:1; transform:translateY(0); }
        .error-msg::before { content:'!'; display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; border:1px solid var(--red); border-radius:50%; flex-shrink:0; font-size:10px; }

        @keyframes shake { 0%,100% { transform:translateX(0); } 20% { transform:translateX(-8px); } 40% { transform:translateX(8px); } 60% { transform:translateX(-5px); } 80% { transform:translateX(5px); } }
        .shake { animation:shake 0.4s ease; }

        .panel-footer { margin-top:24px; font-family:var(--mono); font-size:10px; color:var(--dim); letter-spacing:0.08em; display:flex; justify-content:space-between; }

        /* Stream */
        #stream-container { position:fixed; inset:0; display:none; background:#000; z-index:5; }
        #ninja-frame { width:100%; height:100%; border:none; display:block; background:#000; position:relative; z-index:1; }
        #loading-screen { position:absolute; inset:0; z-index:2; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#080a0d; }
        @keyframes spin { to { transform:rotate(360deg); } }

        #logout-btn {
            position:fixed; top:14px; right:16px; z-index:100;
            background:rgba(255,71,87,0.12); border:1px solid rgba(255,71,87,0.35);
            color:var(--red); font-family:var(--sans); font-size:12px; font-weight:600;
            letter-spacing:0.1em; padding:6px 14px; border-radius:3px; cursor:pointer; transition:background 0.2s;
        }
        #logout-btn:hover { background:rgba(255,71,87,0.25); }
    </style>
</head>
<body>

   
    <div id="login-page">
        <div class="panel" id="li-panel">
            <div class="badge">Accès Restreint</div>
            <h2>Stream Privé</h2>
            <p class="subtitle">Connectez-vous pour accéder au stream</p>
            <div class="divider"></div>

            <div class="input-group">
                <label class="input-label" for="li-login">Identifiant</label>
                <div class="input-wrap">
                    <input type="text" id="li-login" placeholder="Votre identifiant" autocomplete="off" autofocus>
                </div>
            </div>
            <div class="input-group">
                <label class="input-label" for="li-password">Mot de passe</label>
                <div class="input-wrap">
                    <input type="password" id="li-password" placeholder="••••••••••••••" autocomplete="off">
                    <button class="eye-btn" type="button" onclick="toggleEye('li-password','li-eye')">
                        <svg id="li-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button class="btn-submit" id="li-btn" onclick="doLogin()">Se connecter</button>
            <div class="error-msg" id="li-error"></div>
            <div class="switch-link">Pas encore de compte ? <a onclick="goToSignup()">Créer un compte</a></div>
            <div class="panel-footer"><span>STREAM_v2.0</span><span id="clock">--:--:--</span></div>
        </div>
    </div>

   
    <div id="signup-page">
        <div class="panel" id="su-panel">
            <div class="badge">Nouveau compte</div>
            <h2>Inscription</h2>
            <p class="subtitle">Créez votre accès au stream privé</p>
            <div class="divider"></div>

            <div class="input-group">
                <label class="input-label" for="su-email">Email</label>
                <div class="input-wrap">
                    <input type="email" id="su-email" placeholder="votre@email.com" autocomplete="off">
                </div>
            </div>
            <div class="input-group">
                <label class="input-label" for="su-login">Identifiant</label>
                <div class="input-wrap">
                    <input type="text" id="su-login" placeholder="Choisissez un identifiant" autocomplete="off">
                </div>
            </div>
            <div class="input-group">
                <label class="input-label" for="su-password">Mot de passe</label>
                <div class="input-wrap">
                    <input type="password" id="su-password" placeholder="Minimum 6 caractères" autocomplete="off">
                    <button class="eye-btn" type="button" onclick="toggleEye('su-password','su-eye')">
                        <svg id="su-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button class="btn-submit" id="su-btn" onclick="doSignup()">Créer mon compte</button>
            <div class="error-msg" id="su-error"></div>
            <div class="switch-link">Déjà un compte ? <a onclick="goToLogin()">Se connecter</a></div>
            <div class="panel-footer"><span>STREAM_v2.0</span><span id="clock2">--:--:--</span></div>
        </div>
    </div>

    
    <div id="stream-container">
        <button id="logout-btn" onclick="doLogout()">✕ Déconnexion</button>
        <div id="loading-screen">
            <div style="position:relative;width:64px;height:64px;margin-bottom:24px;">
                <div style="position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:#ff4757;animation:spin 1s linear infinite;"></div>
                <div style="position:absolute;inset:10px;border-radius:50%;border:2px solid transparent;border-bottom-color:rgba(255,71,87,0.4);animation:spin 1.6s linear infinite reverse;"></div>
            </div>
            <div style="font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:0.2em;color:#ff4757;margin-bottom:8px;">CHARGEMENT DU STREAM</div>
            <div style="font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:0.1em;color:#4a5568;" id="load-msg">Connexion en cours…</div>
        </div>
        <iframe id="ninja-frame" src="" allow="autoplay; camera; microphone; fullscreen; display-capture;"></iframe>
    </div>

    
    <script type="module">
        import { initializeApp }                                           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword,
                 signInWithEmailAndPassword, onAuthStateChanged,
                 signOut, updateProfile }                                  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, setDoc,
                 collection, query, where, getDocs }                      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  
        const firebaseConfig = {
  apiKey: "AIzaSyDAQXRDSG9CgWMD04fqrkFLNtDDHu2XD-8",
  authDomain: "stream-prive.firebaseapp.com",
  projectId: "stream-prive",
  storageBucket: "stream-prive.firebasestorage.app",
  messagingSenderId: "1019319660261",
  appId: "1:1019319660261:web:deffb39de5b9dd110e2e0c"
};


        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

        // URL stream encodée
        const _NU = atob('aHR0cHM6Ly92ZG8ubmluamEvP3ZpZXc9SGVudGNodSZzb2xvJnJvb209Q2FtZXJhRnB2bUlEJnBhc3N3b3JkPVZET2Zwdm0xMjM0JmJpdHJhdGU9MTAwMDAmc2NhbGU9MTAwJmNsZWFuJmJ1ZmZlcj0wJmF1dG9wbGF5PTEmYXV0b3N0YXJ0PTEmY2xlYW5vdXRwdXQ9MSZub21lbnU9MQ==');

        // ── Auth state listener ──────────────────────────────────
        onAuthStateChanged(auth, (user) => {
            if (user) { launchStream(); }
            else      { showPage('login-page'); }
        });

        // ── INSCRIPTION ──────────────────────────────────────────
        window.doSignup = async function() {
            const email = document.getElementById('su-email').value.trim();
            const login = document.getElementById('su-login').value.trim();
            const pass  = document.getElementById('su-password').value;
            const err   = document.getElementById('su-error');
            const btn   = document.getElementById('su-btn');

            if (!email || !login || !pass) return showErr(err, 'Remplissez tous les champs.');
            if (pass.length < 6)           return showErr(err, 'Mot de passe : 6 caractères minimum.');

            setBtnLoading(btn, 'Création en cours...');
            try {
                // Vérifier si le login est déjà pris
                const q    = query(collection(db, 'users'), where('login', '==', login));
                const snap = await getDocs(q);
                if (!snap.empty) { resetBtn(btn, 'Créer mon compte'); return showErr(err, 'Identifiant déjà utilisé.'); }

                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(cred.user, { displayName: login });
                await setDoc(doc(db, 'users', cred.user.uid), {
                    login, email,
                    createdAt: new Date().toISOString(),
                    active: true
                });
                launchStream();
            } catch(e) {
                resetBtn(btn, 'Créer mon compte');
                if      (e.code === 'auth/email-already-in-use') showErr(err, 'Email déjà utilisé.');
                else if (e.code === 'auth/invalid-email')        showErr(err, 'Email invalide.');
                else                                             showErr(err, 'Erreur : ' + e.message);
            }
        };

        // ── CONNEXION ────────────────────────────────────────────
        window.doLogin = async function() {
            const login = document.getElementById('li-login').value.trim();
            const pass  = document.getElementById('li-password').value;
            const err   = document.getElementById('li-error');
            const btn   = document.getElementById('li-btn');
            const panel = document.getElementById('li-panel');

            if (!login || !pass) { shakePanel(panel); return showErr(err, 'Remplissez tous les champs.'); }

            setBtnLoading(btn, 'Connexion...');
            try {
                const q    = query(collection(db, 'users'), where('login', '==', login));
                const snap = await getDocs(q);

                if (snap.empty) {
                    resetBtn(btn, 'Se connecter');
                    shakePanel(panel);
                    return showErr(err, 'Identifiant introuvable.');
                }

                const userData = snap.docs[0].data();
                if (userData.active === false) {
                    resetBtn(btn, 'Se connecter');
                    shakePanel(panel);
                    return showErr(err, 'Compte désactivé. Contactez l\'admin.');
                }

                await signInWithEmailAndPassword(auth, userData.email, pass);
                launchStream();
            } catch(e) {
                resetBtn(btn, 'Se connecter');
                shakePanel(panel);
                if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
                    showErr(err, 'Mot de passe incorrect.');
                } else {
                    showErr(err, 'Erreur de connexion.');
                }
            }
        };

        // ── DÉCONNEXION ──────────────────────────────────────────
        window.doLogout = async function() {
            document.getElementById('ninja-frame').src = '';
            await signOut(auth);
        };

        // ── Lancer le stream ─────────────────────────────────────
        function launchStream() {
            showPage('stream-container');
            const fr = document.getElementById('ninja-frame');
            const msgs = ['Connexion en cours…','Authentification du flux…','Établissement P2P…','Synchronisation vidéo…','Presque prêt…'];
            let mi = 0;
            const mt = setInterval(() => {
                mi = (mi+1) % msgs.length;
                const el = document.getElementById('load-msg');
                if (el) el.textContent = msgs[mi];
            }, 2500);
            setTimeout(() => { fr.src = _NU; }, 400);
            const fb = setTimeout(() => { if (!fr.src || fr.src === 'about:blank') fr.src = _NU; }, 8000);
            fr.onload = () => {
                clearTimeout(fb); clearInterval(mt);
                const ls = document.getElementById('loading-screen');
                if (ls) { ls.style.transition='opacity 0.6s ease'; ls.style.opacity='0'; setTimeout(()=>{ ls.style.display='none'; }, 600); }
            };
        }

        // ── Helpers ──────────────────────────────────────────────
        function showPage(id) {
            ['login-page','signup-page','stream-container'].forEach(p => {
                const el = document.getElementById(p);
                if (!el) return;
                el.style.display = 'none';
            });
            const t = document.getElementById(id);
            if (t) t.style.display = (id === 'stream-container') ? 'block' : 'flex';
        }
        function showErr(el, msg) {
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 4000);
        }
        function shakePanel(p) { p.classList.remove('shake'); void p.offsetWidth; p.classList.add('shake'); }
        function setBtnLoading(btn, txt) { btn.textContent = txt; btn.disabled = true; }
        function resetBtn(btn, txt)      { btn.textContent = txt; btn.disabled = false; }

        // Clock
        function tick() {
            const t = new Date().toTimeString().slice(0,8);
            const c1 = document.getElementById('clock');  if(c1) c1.textContent = t;
            const c2 = document.getElementById('clock2'); if(c2) c2.textContent = t;
        }
        tick(); setInterval(tick, 1000);

        // Navigation
        window.goToSignup = () => showPage('signup-page');
        window.goToLogin  = () => showPage('login-page');

        // Eye toggle
        window.toggleEye = function(inputId, iconId) {
            const inp = document.getElementById(inputId);
            const ico = document.getElementById(iconId);
            if (inp.type === 'password') {
                inp.type = 'text';
                ico.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
            } else {
                inp.type = 'password';
                ico.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>';
            }
        };

        // Enter key
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const lp = document.getElementById('login-page');
                const sp = document.getElementById('signup-page');
                if (lp && lp.style.display !== 'none') window.doLogin();
                else if (sp && sp.style.display !== 'none') window.doSignup();
            }
            if (e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key.toUpperCase()))||(e.ctrlKey&&e.key.toUpperCase()==='U')) {
                e.preventDefault(); return false;
            }
        });
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
